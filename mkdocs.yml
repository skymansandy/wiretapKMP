site_name: WiretapKMP
site_description: Kotlin Multiplatform network inspection SDK for Android, iOS, and JVM
site_url: ""
repo_url: https://github.com/aspect-build/WiretapKMP
repo_name: WiretapKMP

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Guides:
      - Ktor (KMP): guides/ktor.md
      - OkHttp (Android/JVM): guides/okhttp.md
      - URLSession (iOS/Swift): guides/urlsession.md
      - WebSocket Support: guides/websockets.md
      - Rules Engine: guides/rules.md
  - Configuration:
      - WiretapConfig: configuration/config.md
      - Header Actions: configuration/headers.md
      - Log Retention: configuration/retention.md
  - Architecture:
      - Overview: architecture/overview.md
      - Module Structure: architecture/modules.md
      - Request Flow: architecture/request-flow.md
  - API Reference:
      - Core: api/core.md
      - Ktor Plugin: api/ktor.md
      - OkHttp Interceptor: api/okhttp.md
      - URLSession Interceptor: api/urlsession.md
      - Rules & Matchers: api/rules.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aspect-build/WiretapKMP
