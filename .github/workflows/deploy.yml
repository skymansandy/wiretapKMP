name: Publish

on:
  push:
    branches: [ main ]

concurrency:
  group: main-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-coverage:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests with coverage
        run: ./gradlew koverXmlReportJvmCoverage

      - name: Parse coverage percentage
        id: coverage
        run: |
          REPORT="build/reports/kover/reportJvmCoverage.xml"
          if [ -f "$REPORT" ]; then
            MISSED=$(grep -oP 'type="INSTRUCTION"[^/]*missed="\K[0-9]+' "$REPORT" | head -1)
            COVERED=$(grep -oP 'type="INSTRUCTION"[^/]*covered="\K[0-9]+' "$REPORT" | head -1)
            TOTAL=$((MISSED + COVERED))
            if [ "$TOTAL" -gt 0 ]; then
              PERCENTAGE=$((COVERED * 100 / TOTAL))
            else
              PERCENTAGE=0
            fi
          else
            PERCENTAGE=0
          fi
          echo "percentage=$PERCENTAGE" >> "$GITHUB_OUTPUT"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/kover/

  publish:
    name: Publish & Update
    needs: test-and-coverage
    if: ${{ !startsWith(github.event.head_commit.message, 'chore:') }}
    runs-on: macos-latest
    environment: default
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish and release to Maven Central (includes KMMBridge zip)
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache -PENABLE_PUBLISHING=true

      - name: Generate Package.swift for SPM
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew :wiretap-urlsession:kmmBridgePublish -x :wiretap-urlsession:publishKMMBridgeFrameworkPublicationToMavenCentralRepository --no-configuration-cache -PENABLE_PUBLISHING=true

      - name: Fix Package.swift Maven Central URL
        run: |
          VERSION=$(grep 'wiretap.version=' gradle.properties | cut -d= -f2)
          GROUP=$(grep 'wiretap.group=' gradle.properties | cut -d= -f2)
          GROUP_PATH=$(echo "$GROUP" | tr '.' '/')
          ARTIFACT="wiretap-urlsession-kmmbridge"
          MAVEN_URL="https://repo1.maven.org/maven2/${GROUP_PATH}/${ARTIFACT}/${VERSION}/${ARTIFACT}-${VERSION}.zip"
          sed -i '' "s|file:[^\"]*\.zip|${MAVEN_URL}|" Package.swift

      - name: Read version from gradle.properties
        id: version
        run: |
          VERSION=$(grep 'wiretap.version=' gradle.properties | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine coverage badge color
        id: badge
        run: |
          COVERAGE=${{ needs.test-and-coverage.outputs.coverage }}
          if [ "$COVERAGE" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$COVERAGE" -ge 60 ]; then
            COLOR="green"
          elif [ "$COVERAGE" -ge 40 ]; then
            COLOR="yellowgreen"
          elif [ "$COVERAGE" -ge 20 ]; then
            COLOR="orange"
          else
            COLOR="red"
          fi
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"

      - name: Update README badges
        run: |
          COVERAGE=${{ needs.test-and-coverage.outputs.coverage }}
          COLOR=${{ steps.badge.outputs.color }}
          REPO=${{ github.repository }}
          VERSION=${{ steps.version.outputs.version }}

          VERSION_ESCAPED=$(echo "$VERSION" | sed 's/-/--/g')

          BUILD_BADGE='  <a href="https://github.com/'"${REPO}"'/actions/workflows/deploy.yml"><img src="https://github.com/'"${REPO}"'/actions/workflows/deploy.yml/badge.svg" alt="Build"/></a>'
          COVERAGE_BADGE='  <a href="https://github.com/'"${REPO}"'/actions/workflows/deploy.yml"><img src="https://img.shields.io/badge/coverage-'"${COVERAGE}"'%25-'"${COLOR}"'" alt="Coverage"/></a>'
          MAVEN_BADGE='  <a href="https://central.sonatype.com/search?q=dev.skymansandy+wiretap"><img src="https://img.shields.io/badge/maven--central-'"${VERSION_ESCAPED}"'-blue" alt="Maven Central"/></a>'

          # Replace badge block between <p align="center"> and </p> (second occurrence — after icon)
          python3 -c "
          import re
          with open('README.md', 'r') as f:
              content = f.read()
          badges = '''$BUILD_BADGE\n$COVERAGE_BADGE\n$MAVEN_BADGE'''
          # Match the second <p align=\"center\"> block (badges, not icon)
          pattern = r'(<p align=\"center\">\n)(.*?)(</p>)'
          parts = list(re.finditer(pattern, content, re.DOTALL))
          if len(parts) >= 2:
              m = parts[1]
              content = content[:m.start()] + m.group(1) + badges + '\n' + m.group(3) + content[m.end():]
          with open('README.md', 'w') as f:
              f.write(content)
          "

      - name: Update version in README and docs
        run: |
          VERSION=${{ steps.version.outputs.version }}
          sed -i '' "s|dev.skymansandy:wiretap-\([a-z-]*\):[^\"]*\"|dev.skymansandy:wiretap-\1:${VERSION}\"|g" README.md
          find docs -name '*.md' -exec sed -i '' "s|dev.skymansandy:wiretap-\([a-z-]*\):[^\"]*\"|dev.skymansandy:wiretap-\1:${VERSION}\"|g" {} +

      - name: Commit all updates
        run: |
          git config user.name "skymansandy"
          git config user.email "iamsandythedev@gmail.com"
          git add README.md Package.swift docs/
          git diff --staged --quiet || git commit -m "ci: Update README badges and Package.swift [skip ci]"
          git push

  github-release:
    name: GitHub Release
    needs: publish
    if: ${{ !startsWith(github.event.head_commit.message, 'chore:') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep 'wiretap.version=' gradle.properties | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-docs:
    name: Deploy Docs
    needs: test-and-coverage
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs and theme
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
